        function App() {
            const [view, setView] = useState('dashboard');
            const [scales, setScales] = useState([]);
            const [current, setCurrent] = useState(null);
            const [quote, setQuote] = useState(0);
            
            // Пользовательские настройки текстов (редактируемые)
            const [TASK_TYPES, setTaskTypes] = useState(() => {
                const saved = localStorage.getItem('customTaskTypes');
                return saved ? JSON.parse(saved) : DEFAULT_TASK_TYPES;
            });
            const [QUOTES, setQuotes] = useState(() => {
                const saved = localStorage.getItem('customQuotes');
                return saved ? JSON.parse(saved) : DEFAULT_QUOTES;
            });
            const [LEVEL_HINTS, setLevelHints] = useState(() => {
                const saved = localStorage.getItem('customLevelHints');
                return saved ? JSON.parse(saved) : DEFAULT_LEVEL_HINTS;
            });
            const [LEVEL_NAMES, setLevelNames] = useState(() => {
                const saved = localStorage.getItem('customLevelNames');
                return saved ? JSON.parse(saved) : DEFAULT_LEVEL_NAMES;
            });

            // Сохранение настроек при изменении
            useEffect(() => {
                localStorage.setItem('customTaskTypes', JSON.stringify(TASK_TYPES));
            }, [TASK_TYPES]);
            useEffect(() => {
                localStorage.setItem('customQuotes', JSON.stringify(QUOTES));
            }, [QUOTES]);
            useEffect(() => {
                localStorage.setItem('customLevelHints', JSON.stringify(LEVEL_HINTS));
            }, [LEVEL_HINTS]);
            useEffect(() => {
                localStorage.setItem('customLevelNames', JSON.stringify(LEVEL_NAMES));
            }, [LEVEL_NAMES]);

            useEffect(() => {
                // Загрузка из URL (приоритет)
                const hash = window.location.hash;
                // Режим просмотра (view-only): #view=<compressed_data>
                if (hash.startsWith('#view=')) {
                    try {
                        const compressed = hash.substring(6);
                        const data = decodeURIComponent(atob(compressed));
                        const parsed = JSON.parse(data);
                        setCurrent(parsed);
                        setView('viewer'); // Специальный режим просмотра
                        return;
                    } catch (e) {
                        console.error('Ошибка загрузки проекта из URL:', e);
                        alert('❌ Ошибка загрузки проекта из ссылки. Проверьте корректность ссылки.');
                    }
                }
                // Режим редактирования: #project=<compressed_data>
                if (hash.startsWith('#project=')) {
                    try {
                        const compressed = hash.substring(9);
                        const data = decodeURIComponent(atob(compressed));
                        const parsed = JSON.parse(data);
                        // Добавить проект к существующим
                        const existing = JSON.parse(localStorage.getItem('adminScales') || '[]');
                        const newScales = [...existing, parsed];
                        setScales(newScales);
                        setCurrent(parsed);
                        setView('editor');
                        // Очистить hash после загрузки
                        window.history.replaceState(null, '', window.location.pathname);
                        return;
                    } catch (e) {
                        console.error('Ошибка загрузки проекта из URL:', e);
                        alert('❌ Ошибка загрузки проекта из ссылки. Проверьте корректность ссылки.');
                    }
                }
                // Загрузка из LocalStorage
                const saved = localStorage.getItem('adminScales');
                if (saved) try { setScales(JSON.parse(saved)); } catch (e) {}
            }, []);

            useEffect(() => {
                if (scales.length > 0) localStorage.setItem('adminScales', JSON.stringify(scales));
            }, [scales]);

            useEffect(() => {
                const int = setInterval(() => setQuote((p) => (p + 1) % QUOTES.length), 10000);
                return () => clearInterval(int);
            }, []);

            // ============================================
            // SUPABASE ИНТЕГРАЦИЯ
            // ============================================
            
            // Инициализация Supabase клиента
            const getSupabaseClient = () => {
                const url = localStorage.getItem('supabase_url');
                const key = localStorage.getItem('supabase_key');
                if (!url || !key) return null;
                return window.supabase.createClient(url, key);
            };

            // Сохранить шкалу в Supabase
            const saveScaleToSupabase = async (scale) => {
                const supabase = getSupabaseClient();
                if (!supabase) {
                    console.log('Supabase не настроен, сохранение только в localStorage');
                    return;
                }

                try {
                    // Сохраняем основную шкалу
                    const { data: scaleData, error: scaleError } = await supabase
                        .from('scales')
                        .upsert({
                            id: scale.id,
                            name: scale.name,
                            created: scale.created,
                            goal: scale.goal,
                            purpose: scale.purpose,
                            policy: scale.policy,
                            plan: scale.plan,
                            orders: scale.orders,
                            ideal: scale.ideal,
                            stats: scale.stats,
                            vfp: scale.vfp
                        }, { onConflict: 'id' })
                        .select();

                    if (scaleError) throw scaleError;

                    // Сохраняем программы
                    if (scale.programs && scale.programs.length > 0) {
                        for (let i = 0; i < scale.programs.length; i++) {
                            const prog = scale.programs[i];
                            const progId = prog.id || `${scale.id}-prog-${i}`;
                            
                            const { data: progData, error: progError } = await supabase
                                .from('programs')
                                .upsert({
                                    id: progId,
                                    scale_id: scale.id,
                                    name: prog.name,
                                    main_task: prog.mainTask,
                                    position: i
                                }, { onConflict: 'id' })
                                .select();

                            if (progError) throw progError;

                            // Сохраняем шаги программы
                            if (prog.steps && prog.steps.length > 0) {
                                for (let j = 0; j < prog.steps.length; j++) {
                                    const step = prog.steps[j];
                                    const stepId = step.id || `${progId}-step-${j}`;
                                    
                                    const { data: stepData, error: stepError } = await supabase
                                        .from('steps')
                                        .upsert({
                                            id: stepId,
                                            program_id: progId,
                                            name: step.name,
                                            deadline: step.deadline,
                                            responsible: step.responsible,
                                            position: j
                                        }, { onConflict: 'id' })
                                        .select();

                                    if (stepError) throw stepError;

                                    // Сохраняем задачи
                                    const allTasks = [];
                                    ['primary', 'vital', 'conditional', 'operating', 'production'].forEach(type => {
                                        if (step.tasks[type]) {
                                            step.tasks[type].forEach((task, idx) => {
                                                allTasks.push({
                                                    id: task.id || `${stepId}-${type}-${idx}`,
                                                    step_id: stepId,
                                                    text: task.text,
                                                    deadline: task.deadline,
                                                    responsible: task.responsible,
                                                    completed: task.completed,
                                                    task_type: type,
                                                    position: idx
                                                });
                                            });
                                        }
                                    });

                                    if (allTasks.length > 0) {
                                        const { error: tasksError } = await supabase
                                            .from('tasks')
                                            .upsert(allTasks, { onConflict: 'id' });

                                        if (tasksError) throw tasksError;
                                    }
                                }
                            }
                        }
                    }

                    console.log('✅ Шкала сохранена в Supabase:', scale.name);
                } catch (error) {
                    console.error('❌ Ошибка сохранения в Supabase:', error.message);
                    alert('⚠️ Не удалось сохранить в облако. Данные сохранены локально.');
                }
            };

            // Загрузить все шкалы из Supabase
            const loadScalesFromSupabase = async () => {
                const supabase = getSupabaseClient();
                if (!supabase) return [];

                try {
                    const { data: scalesData, error: scalesError } = await supabase
                        .from('scales')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (scalesError) throw scalesError;

                    // Загружаем программы для каждой шкалы
                    const fullScales = [];
                    for (const scale of scalesData) {
                        const { data: programsData } = await supabase
                            .from('programs')
                            .select('*')
                            .eq('scale_id', scale.id)
                            .order('position');

                        const programs = [];
                        for (const prog of (programsData || [])) {
                            const { data: stepsData } = await supabase
                                .from('steps')
                                .select('*')
                                .eq('program_id', prog.id)
                                .order('position');

                            const steps = [];
                            for (const step of (stepsData || [])) {
                                const { data: tasksData } = await supabase
                                    .from('tasks')
                                    .select('*')
                                    .eq('step_id', step.id)
                                    .order('position');

                                const tasks = {
                                    primary: [],
                                    vital: [],
                                    conditional: [],
                                    operating: [],
                                    production: []
                                };

                                (tasksData || []).forEach(task => {
                                    tasks[task.task_type].push({
                                        id: task.id,
                                        text: task.text,
                                        deadline: task.deadline,
                                        responsible: task.responsible,
                                        completed: task.completed
                                    });
                                });

                                steps.push({
                                    id: step.id,
                                    name: step.name,
                                    deadline: step.deadline,
                                    responsible: step.responsible,
                                    tasks
                                });
                            }

                            programs.push({
                                id: prog.id,
                                name: prog.name,
                                mainTask: prog.main_task,
                                steps
                            });
                        }

                        fullScales.push({
                            id: scale.id,
                            name: scale.name,
                            created: scale.created,
                            goal: scale.goal,
                            purpose: scale.purpose,
                            policy: scale.policy,
                            plan: scale.plan,
                            programs,
                            orders: scale.orders,
                            ideal: scale.ideal,
                            stats: scale.stats,
                            vfp: scale.vfp
                        });
                    }

                    console.log('✅ Загружено шкал из Supabase:', fullScales.length);
                    return fullScales;
                } catch (error) {
                    console.error('❌ Ошибка загрузки из Supabase:', error.message);
                    return [];
                }
            };

            // Удалить шкалу из Supabase
            const deleteScaleFromSupabase = async (scaleId) => {
                const supabase = getSupabaseClient();
                if (!supabase) return;

                try {
                    // Благодаря CASCADE удалятся все связанные программы, шаги и задачи
                    const { error } = await supabase
                        .from('scales')
                        .delete()
                        .eq('id', scaleId);

                    if (error) throw error;
                    console.log('✅ Шкала удалена из Supabase:', scaleId);
                } catch (error) {
                    console.error('❌ Ошибка удаления из Supabase:', error.message);
                }
            };

            const createNew = (tpl = null) => {
                const s = {
                    id: Date.now(),
                    name: tpl ? TEMPLATES[tpl].name : "Новая шкала",
                    created: new Date().toISOString(),
                    ...(tpl ? TEMPLATES[tpl].data : {
                        goal: "", purpose: "", policy: "", plan: "", 
                        programs: [], // Массив программ (каждая с названием, mainTask и steps)
                        orders: "", ideal: "", stats: "", vfp: ""
                    })
                };
                setScales([...scales, s]);
                setCurrent(s);
                setView('editor');
            };

            const exportCurrentToLink = (scale) => {
                const data = JSON.stringify(scale);
                const compressed = btoa(encodeURIComponent(data));
                const url = `${window.location.origin}${window.location.pathname}#project=${compressed}`;
                navigator.clipboard.writeText(url).then(() => {
                    alert(`✅ Ссылка на проект "${scale.name}" скопирована!\n\nТеперь вы можете:\n• Отправить её коллегам\n• Сохранить в закладки\n• Открыть на другом устройстве`);
                }).catch(() => {
                    prompt('Скопируйте эту ссылку:', url);
                });
            };

            const exportViewOnlyLink = (scale) => {
                const data = JSON.stringify(scale);
                const compressed = btoa(encodeURIComponent(data));
                const url = `${window.location.origin}${window.location.pathname}#view=${compressed}`;
                navigator.clipboard.writeText(url).then(() => {
                    alert(`✅ Чистая ссылка на программу "${scale.name}" скопирована!\n\n📖 Эта ссылка откроет программу в режиме просмотра:\n• Без кнопок редактирования\n• Только название программы и содержание\n• Идеально для презентаций и печати`);
                }).catch(() => {
                    prompt('Скопируйте эту ссылку:', url);
                });
            };

            const convertToMarkdown = (scale) => {
                let md = `# ${scale.name}\n\n`;
                
                if (scale.goal) md += `## 1. ${LEVEL_NAMES.goal}\n${scale.goal}\n\n`;
                if (scale.purpose) md += `## 2. ${LEVEL_NAMES.purpose}\n${scale.purpose}\n\n`;
                if (scale.policy) md += `## 3. ${LEVEL_NAMES.policy}\n${scale.policy}\n\n`;

                                    const tasks = step.tasks[type] || [];

                                        tasks.forEach(task => {

                                            if (task.deadline || task.responsible) {
                                                md += ' (';

                                            md += '\n';
                                        });

                        md += '\n';

                }
                
                if (scale.orders) md += `## 7. ${LEVEL_NAMES.orders}\n${scale.orders}\n\n`;

                if (scale.stats) md += `## 9. ${LEVEL_NAMES.stats}\n${scale.stats}\n\n`;
                if (scale.vfp) md += `## 10. ${LEVEL_NAMES.vfp}\n${scale.vfp}\n\n`;
                
                return md;

            const openMindMap = (scale) => {
                const markdown = convertToMarkdown(scale);
                const safeName = scale.name.replace(/[^a-zа-я0-9]/gi, '_');
                const html = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mind-карта: ` + scale.name + `</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #mindmap { width: 100vw; height: 100vh; }

        .toolbar button:hover { background: #4338ca; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"><` + `/script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.16"><` + `/script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.16"><` + `/script>
</head>
<body>
    <div class="toolbar">
        <button onclick="downloadSVG()">💾 Скачать SVG</button>
        <button onclick="window.print()">🖨️ Печать</button>
        <button onclick="window.close()">✖️ Закрыть</button>
    </div>
    <svg id="mindmap" style="width: 100vw; height: 100vh;"></svg>
    <script>
        const markdown = ` + JSON.stringify(markdown) + `;
        
        // Ждём загрузки всех библиотек
        window.addEventListener('load', () => {
            const { Transformer } = window.markmap;
            const { Markmap } = window.markmap;
            
            if (!Transformer || !Markmap) {
                alert('Ошибка загрузки библиотек markmap. Попробуйте позже.');
                return;
            }
            
            const transformer = new Transformer();
            const { root } = transformer.transform(markdown);
            const mm = Markmap.create('#mindmap', {
                color: (node) => node.state?.path?.length % 2 === 0 ? '#4f46e5' : '#06b6d4',
                duration: 500,
                maxWidth: 300,
                paddingX: 8
            }, root);
            
            // Авто-подгон
            setTimeout(() => mm?.fit(), 500);
        });
        
        function downloadSVG() {
            const svg = document.querySelector('#mindmap');
            if (!svg) return alert('SVG не найден');
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svg);
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mind-map-` + safeName + `.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    <` + `/script>
</body>
</html>
                `;
                const newWindow = window.open('', '_blank', 'width=1400,height=900');
                if (!newWindow) {
                    alert('Не удалось открыть новое окно. Разрешите всплывающие окна для этого сайта.');
                    return;
                }
                newWindow.document.write(html);
                newWindow.document.close();
            };

            const exportToJSON = () => {
                const data = JSON.stringify(scales, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `admin-scale-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const importFromJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {

                };
                reader.readAsText(file);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="scale-card rounded-2xl p-6 mb-8 no-print">

                            <p className="text-gray-400 italic" key={quote}>"{QUOTES[quote].text}" — {QUOTES[quote].author}</p>
                        </header>

                        <nav className="flex gap-4 mb-8 flex-wrap no-print">

                                    </button>

        function Editor({ scale, onSave, onClose, onPrint, TASK_TYPES, LEVEL_NAMES, LEVEL_HINTS, openMindMap }) {

            // === УПРАВЛЕНИЕ ПРОГРАММАМИ ===

                const newProgram = {
                    name: "Новая программа",

            const updProgramName = (progIdx, name) => {
                const progs = [...(d.programs || [])];
                progs[progIdx].name = name;
                upd('programs', progs);

            const updProgramMainTask = (progIdx, mainTask) => {
                const progs = [...(d.programs || [])];
                progs[progIdx].mainTask = mainTask;
                upd('programs', progs);

                    name: "Новый шаг программы",
                    deadline: "",
                    responsible: "",

                        primary: [],
                        vital: [],
                        conditional: [],
                        operating: [],
                        production: []
                    }

                const progs = [...(d.programs || [])];
                progs[progIdx].steps = [...(progs[progIdx].steps || []), newStep];

                const progs = [...(d.programs || [])];
                progs[progIdx].steps[stepIdx].name = name;
                upd('programs', progs);
            };

            const updStepDeadline = (progIdx, stepIdx, deadline) => {
                const progs = [...(d.programs || [])];
                progs[progIdx].steps[stepIdx].deadline = deadline;
                upd('programs', progs);

                const progs = [...(d.programs || [])];
                progs[progIdx].steps[stepIdx].responsible = responsible;
                upd('programs', progs);

                    const progs = [...(d.programs || [])];
                    progs[progIdx].steps = progs[progIdx].steps.filter((_, i) => i !== stepIdx);
                    upd('programs', progs);

            };

            const addTask = (progIdx, stepIdx, type) => {
                const progs = [...(d.programs || [])];
                progs[progIdx].steps[stepIdx].tasks[type].push({
                    text: "Новая задача",
                    deadline: "",
                    responsible: "",
                    completed: false
                });
                upd('programs', progs);
            };

            const updTask = (progIdx, stepIdx, type, taskIdx, field, value) => {
                const progs = [...(d.programs || [])];
                progs[progIdx].steps[stepIdx].tasks[type][taskIdx][field] = value;
                upd('programs', progs);
            };

            const delTask = (progIdx, stepIdx, type, taskIdx) => {
                const progs = [...(d.programs || [])];
                progs[progIdx].steps[stepIdx].tasks[type].splice(taskIdx, 1);
                upd('programs', progs);
            };

                const compressed = btoa(encodeURIComponent(data));
                const url = `${window.location.origin}${window.location.pathname}#project=${compressed}`;

            const exportViewLink = () => {

                const compressed = btoa(encodeURIComponent(data));

                                    {(d.programs || []).map((program, progIdx) => (

                                                    <input 
                                                        type="text" 
                                                        value={program.name}
                                                        onChange={(e) => updProgramName(progIdx, e.target.value)}
                                                        className="w-full px-4 py-2 bg-gray-800 rounded-lg text-xl font-bold text-indigo-300 outline-none focus:ring-2 focus:ring-indigo-500"
                                                        placeholder="Название программы" 
                                                    />
                                                </div>
                                                <button 
                                                    onClick={() => delProgram(progIdx)}
                                                    className="px-3 py-2 bg-red-600 rounded-lg hover:bg-red-500 no-print self-end"
                                                    title="Удалить программу">
                                                    <i className="fas fa-trash"></i>
                                                </button>
                                            </div>

                                            {/* Главная задача программы */}
                                            <div className="mb-6 p-4 bg-gradient-to-r from-indigo-900/30 to-purple-900/30 border border-indigo-500/30 rounded-lg">
                                                <label className="block text-sm font-semibold text-indigo-300 mb-2">
                                                    <i className="fas fa-bullseye mr-2"></i>ГЛАВНАЯ ЗАДАЧА ПРОГРАММЫ:
                                                </label>
                                                <div contentEditable suppressContentEditableWarning 
                                                    onBlur={(e) => updProgramMainTask(progIdx, e.target.innerText)}
                                                    className="px-4 py-3 bg-gray-800 rounded-lg min-h-[60px] text-gray-200 outline-none focus:ring-2 focus:ring-indigo-500"
                                                >{program.mainTask}</div>
                                                <p className="text-xs text-gray-400 mt-2">
                                                    Пример: "Новая публика, получившая успех от знакомства с ЛРХ и административной технологией"
                                                </p>
                                            </div>
                            
                                            {/* Шаги программы */}
                                            <div className="mb-4">
                                                <h4 className="text-lg font-semibold text-gray-300 mb-3">Шаги программы:</h4>
                                                <div className="space-y-4">
                                                    {(program.steps || []).map((step, stepIdx) => (
                                                        <ProgramStep 
                                                            key={stepIdx} 
                                                            step={step} 
                                                            progIdx={progIdx}
                                                            stepIdx={stepIdx}
                                                            onUpdName={updStepName} 
                                                            onUpdDeadline={updStepDeadline}
                                                            onUpdResponsible={updStepResponsible}
                                                            onDel={delStep}
                                                            onAddTask={addTask} 
                                                            onUpdTask={updTask} 
                                                            onDelTask={delTask}
                                                            TASK_TYPES={TASK_TYPES} 
                                                        />
                                                    ))}
                                                </div>
                                            </div>

                                            <button 
                                                onClick={() => addStep(progIdx)} 
                                                className="mt-4 px-4 py-2 bg-indigo-600 rounded-lg hover:bg-indigo-500 no-print">
                                                <i className="fas fa-plus mr-2"></i>Добавить шаг в эту программу
                                            </button>

                                            {(program.steps || []).length === 0 && (
                                                <p className="text-sm text-gray-400 mt-2 italic">
                                                    Нет шагов. Добавьте первый шаг программы.
                                                </p>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="mt-6 p-4 bg-blue-900/20 border border-blue-500/30 rounded-lg">
                                <p className="text-sm text-blue-300 mb-2">
                                    <i className="fas fa-info-circle mr-2"></i><strong>Важно:</strong>
                                </p>
                                <ul className="text-sm text-gray-300 space-y-1 ml-4">
                                    <li>• Для реализации ПЛАНА может быть <strong>несколько ПРОГРАММ</strong></li>
                                    <li>• Каждая программа имеет <strong>название и главную задачу</strong></li>
                                    <li>• Каждый шаг программы содержит <strong>ВСЕ 5 типов задач</strong></li>
                                    <li>• Укажите дедлайн и ответственного для каждого шага</li>
                                </ul>
                            </div>
                        </div>

                        {/* ПРОЕКТЫ - удалён, теперь всё в ПРОГРАММАХ */}

                        {[
                            { n: 7, icon: "📢", title: "ПРИКАЗЫ", field: "orders" },
                            { n: 8, icon: "🌟", title: "ИДЕАЛЬНАЯ КАРТИНА", field: "ideal" },
                            { n: 9, icon: "📊", title: "СТАТИСТИКИ", field: "stats" },
                            { n: 10, icon: "🏆", title: "ЦКП", field: "vfp" }
                        ].map(l => (
                            <div key={l.n} className={`scale-card p-6 rounded-xl border-l-4 level-${l.n}`}>
                                <h3 className="text-2xl font-bold mb-4">
                                    <span className="text-3xl mr-3">{l.icon}</span>{l.n}. {l.title}
                                </h3>
                                <div contentEditable suppressContentEditableWarning 
                                    onBlur={(e) => upd(l.field, e.target.innerText)}
                                    className="text-lg p-3 rounded min-h-[80px] bg-gray-900/50" 
                                    style={{ whiteSpace: 'pre-wrap' }}
                                >{d[l.field]}</div>
                                <p className="text-gray-400 text-sm mt-3">{LEVEL_HINTS[l.field]}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ProgramStep({ step, progIdx, stepIdx, onUpdName, onUpdDeadline, onUpdResponsible, onDel, onAddTask, onUpdTask, onDelTask, TASK_TYPES }) {
            const [expanded, setExpanded] = useState({});
            const [isPrinting, setIsPrinting] = useState(false);

            useEffect(() => {
                const handleBeforePrint = () => {
                    setIsPrinting(true);
                    // Раскрыть все типы задач перед печатью
                    setExpanded({
                        primary: true,
                        vital: true,
                        conditional: true,
                        operating: true,
                        production: true
                    });
                };
                const handleAfterPrint = () => {
                    setIsPrinting(false);
                };
                window.addEventListener('beforeprint', handleBeforePrint);
                window.addEventListener('afterprint', handleAfterPrint);
                return () => {
                    window.removeEventListener('beforeprint', handleBeforePrint);
                    window.removeEventListener('afterprint', handleAfterPrint);
                };
            }, []);

            const toggleType = (type) => {
                setExpanded(prev => ({ ...prev, [type]: !prev[type] }));
            };

            const totalTasks = Object.values(step.tasks).reduce((sum, tasks) => sum + tasks.length, 0);
            const completedTasks = Object.values(step.tasks).reduce((sum, tasks) => 
                sum + tasks.filter(t => t.completed).length, 0);

            return (
                <div className="bg-gray-900/70 rounded-lg p-6 border-2 border-blue-500/30 shadow-lg">
                    {/* Название шага и кнопка удаления */}
                    <div className="flex items-center justify-between mb-4 gap-3">
                        <div contentEditable suppressContentEditableWarning 
                            onBlur={(e) => onUpdName(progIdx, stepIdx, e.target.innerText)}
                            className="flex-1 text-xl font-bold px-3 py-2 bg-gray-800 rounded hover:bg-gray-700"
                        >{step.name}</div>
                        <button onClick={() => onDel(progIdx, stepIdx)} 
                            className="px-3 py-2 bg-red-600 rounded hover:bg-red-500 no-print">
                            <i className="fas fa-trash"></i>
                        </button>
                    </div>

                    {/* Дедлайн и ответственный для шага */}
                    <div className="flex flex-wrap gap-3 mb-4">
                        <div className="flex items-center gap-2">
                            <label className="text-sm text-gray-400">📅 Дедлайн шага:</label>
                            <input type="date" value={step.deadline || ""} 
                                onChange={(e) => onUpdDeadline(progIdx, stepIdx, e.target.value)}
                                className="px-3 py-1 bg-gray-800 rounded text-sm no-print" />
                            {step.deadline && (
                                <span className="px-2 py-1 bg-blue-600/20 text-blue-300 rounded text-xs">
                                    {new Date(step.deadline).toLocaleDateString('ru-RU')}
                                </span>
                            )}
                        </div>
                        <div className="flex items-center gap-2 flex-1">
                            <label className="text-sm text-gray-400">👤 Ответственный:</label>
                            <input type="text" value={step.responsible || ""} 
                                onChange={(e) => onUpdResponsible(progIdx, stepIdx, e.target.value)}
                                className="px-3 py-1 bg-gray-800 rounded text-sm flex-1 no-print" 
                                placeholder="Имя ответственного" />
                            {step.responsible && (
                                <span className="px-2 py-1 bg-green-600/20 text-green-300 rounded text-xs whitespace-nowrap">
                                    {step.responsible}
                                </span>
                            )}
                        </div>
                    </div>

                    <div className="flex items-center gap-4 mb-4 text-sm">
                        <span className="text-gray-400">📁 Всего задач: <strong className="text-white">{totalTasks}</strong></span>
                        <span className="text-gray-400">✅ Завершено: <strong className="text-green-400">{completedTasks}</strong></span>
                        {totalTasks > 0 && (
                            <div className="flex-1 bg-gray-700 rounded-full h-2 overflow-hidden">
                                <div className="bg-green-500 h-full transition-all" 
                                    style={{ width: `${(completedTasks / totalTasks) * 100}%` }}></div>
                            </div>
                        )}
                    </div>

                    {/* 5 ТИПОВ ЗАДАЧ */}
                    <div className="space-y-3">
                        {Object.entries(TASK_TYPES).map(([type, typeInfo]) => (
                            <div key={type} className="border-l-4 pl-4 bg-gray-800/30 rounded-r" 
                                style={{ borderColor: typeInfo.color.replace('bg-', '#').replace('blue-800', '1e40af').replace('red-600', 'dc2626').replace('yellow-600', 'ca8a04').replace('green-600', '059669').replace('purple-600', '7c3aed') }}>
                                <div className="flex items-center justify-between mb-2 py-2">
                                    <button onClick={() => toggleType(type)} 
                                        className="flex items-center gap-2 text-left flex-1 hover:bg-gray-700/30 px-2 py-1 rounded transition">
                                        <span className={`px-3 py-1 rounded-full text-xs text-white ${typeInfo.color} font-medium`}>
                                            {typeInfo.icon} {typeInfo.name}
                                        </span>
                                        <span className="text-sm text-gray-400">
                                            ({step.tasks[type].length} {step.tasks[type].length === 1 ? 'задача' : 'задач'})
                                        </span>
                                        <i className={`fas fa-chevron-${expanded[type] ? 'down' : 'right'} text-gray-400 text-xs`}></i>
                                    </button>
                                    <button onClick={() => onAddTask(progIdx, stepIdx, type)} 
                                        className="px-3 py-1 bg-gray-700 rounded text-xs hover:bg-gray-600 no-print">
                                        <i className="fas fa-plus mr-1"></i>Задача
                                    </button>
                                </div>

                                {(expanded[type] || isPrinting) && (
                                    <div className="space-y-2 mt-2 mb-3 task-accordion">
                                        {step.tasks[type].length === 0 ? (
                                            <p className="text-sm text-gray-500 italic px-2 py-3">
                                                Нет задач типа "{typeInfo.name}". Нажмите "+ Задача" чтобы добавить.
                                            </p>
                                        ) : (
                                            step.tasks[type].map((task, taskIdx) => (
                                                <TaskItem key={taskIdx} task={task} progIdx={progIdx} stepIdx={stepIdx} type={type} taskIdx={taskIdx}
                                                    onUpd={onUpdTask} onDel={onDelTask} />
                                            ))
                                        )}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Viewer({ scale, TASK_TYPES, LEVEL_NAMES }) {
            return (
                <div className="animate-fadeIn max-w-5xl mx-auto p-6">
                    {/* Только название программы */}
                    <h1 className="text-4xl font-bold text-center mb-8 gradient-text">
                        {scale.name}
                    </h1>

                    <div className="space-y-6">
                        {/* Цель */}
                        {scale.goal && (
                            <div className="scale-card p-6 rounded-xl border-l-4 level-1">
                                <h3 className="text-2xl font-bold mb-4">
                                    <span className="text-3xl mr-3">🎯</span>1. ЦЕЛЬ
                                </h3>
                                <div className="text-gray-300 whitespace-pre-wrap">{scale.goal}</div>
                            </div>
                        )}

                        {/* Замысел */}
                        {scale.purpose && (
                            <div className="scale-card p-6 rounded-xl border-l-4 level-2">
                                <h3 className="text-2xl font-bold mb-4">
                                    <span className="text-3xl mr-3">💡</span>2. ЗАМЫСЕЛ
                                </h3>
                                <div className="text-gray-300 whitespace-pre-wrap">{scale.purpose}</div>
                            </div>
                        )}

                        {/* Политика */}
                        {scale.policy && (
                            <div className="scale-card p-6 rounded-xl border-l-4 level-3">
                                <h3 className="text-2xl font-bold mb-4">
                                    <span className="text-3xl mr-3">📋</span>3. ПОЛИТИКА
                                </h3>
                                <div className="text-gray-300 whitespace-pre-wrap">{scale.policy}</div>
                            </div>
                        )}

                        {/* План */}
                        {scale.plan && (
                            <div className="scale-card p-6 rounded-xl border-l-4 level-4">
                                <h3 className="text-2xl font-bold mb-4">
                                    <span className="text-3xl mr-3">🗺️</span>4. ПЛАН
                                </h3>
                                <div className="text-gray-300 whitespace-pre-wrap">{scale.plan}</div>
                            </div>
                        )}

                        {/* Программы (множественные) */}
                        {scale.programs && scale.programs.length > 0 && (
                            <div className="scale-card p-6 rounded-xl border-l-4 level-5">
                                <h3 className="text-2xl font-bold mb-6">
                                    <span className="text-3xl mr-3">🚀</span>5. ПРОГРАММЫ
                                </h3>

                                <div className="space-y-8">
                                    {scale.programs.map((program, progIdx) => (
                                        <div key={progIdx} className="border border-indigo-500/30 rounded-xl p-6 bg-gradient-to-br from-indigo-900/10 to-purple-900/10">
                                            {/* Название программы */}
                                            <h4 className="text-2xl font-bold text-indigo-300 mb-4">
                                                Программа {progIdx + 1}: {program.name}
                                            </h4>

                                            {/* Главная задача программы */}
                                            {program.mainTask && (
                                                <div className="mb-6 p-4 bg-gradient-to-r from-indigo-900/30 to-purple-900/30 border border-indigo-500/30 rounded-lg">
                                                    <div className="text-sm font-semibold text-indigo-300 mb-2">
                                                        <i className="fas fa-bullseye mr-2"></i>ГЛАВНАЯ ЗАДАЧА:
                                                    </div>
                                                    <div className="text-gray-200 font-medium">{program.mainTask}</div>
                                                </div>
                                            )}

                                            {/* Шаги программы */}
                                            {program.steps && program.steps.length > 0 && (
                                                <div className="space-y-6">
                                                    {program.steps.map((step, stepIdx) => (
                                                        <div key={stepIdx} className="bg-gray-800/50 rounded-lg p-4">
                                                            <div className="flex items-center justify-between mb-4">
                                                                <h5 className="text-xl font-semibold text-indigo-300">
                                                                    Шаг {stepIdx + 1}: {step.name}
                                                                </h5>
                                                                <div className="flex gap-3 text-sm">
                                                                    {step.deadline && (
                                                                        <span className="px-3 py-1 bg-blue-600/20 text-blue-300 rounded">
                                                                            📅 {new Date(step.deadline).toLocaleDateString('ru-RU')}
                                                                        </span>
                                                                    )}
                                                                    {step.responsible && (
                                                                        <span className="px-3 py-1 bg-green-600/20 text-green-300 rounded">
                                                                            👤 {step.responsible}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </div>

                                                            {/* Все 5 типов задач */}
                                                            <div className="space-y-4">
                                                                {Object.entries(TASK_TYPES).map(([type, meta]) => {
                                                                    const tasks = step.tasks[type] || [];
                                                                    if (tasks.length === 0) return null;
                                                                    
                                                                    return (
                                                                        <div key={type} className="bg-gray-900/50 rounded-lg p-3">
                                                                            <h6 className="text-sm font-semibold mb-2 flex items-center gap-2">
                                                                                <span>{meta.icon}</span>
                                                                                <span className={meta.color + " px-2 py-0.5 rounded text-white"}>
                                                                                    {meta.name} ({tasks.length})
                                                                                </span>
                                                                            </h6>
                                                                            <div className="space-y-2">
                                                                                {tasks.map((task, tIdx) => (
                                                                                    <div key={tIdx} className="flex items-start gap-3 bg-gray-800 rounded p-2">
                                                                                        <input type="checkbox" checked={task.completed} readOnly
                                                                                            className="mt-1 w-4 h-4 accent-green-500" />
                                                                                        <div className="flex-1">
                                                                                            <div className={`text-gray-300 text-sm ${task.completed ? 'line-through opacity-60' : ''}`}>
                                                                                                {task.text}
                                                                                            </div>
                                                                                            <div className="flex gap-2 mt-1 text-xs">
                                                                                                {task.deadline && (
                                                                                                    <span className="px-2 py-0.5 bg-blue-600/20 text-blue-300 rounded">
                                                                                                        📅 {new Date(task.deadline).toLocaleDateString('ru-RU')}
                                                                                                    </span>
                                                                                                )}
                                                                                                {task.responsible && (
                                                                                                    <span className="px-2 py-0.5 bg-green-600/20 text-green-300 rounded">
                                                                                                        👤 {task.responsible}
                                                                                                    </span>
                                                                                                )}
                                                                                            </div>
                                                                                        </div>
                                                                                    </div>
                                                                                ))}
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Остальные уровни */}
                        {[
                            { n: 6, icon: "📦", title: "ПРОЕКТЫ", field: "orders" },
                            { n: 7, icon: "📋", title: "ПРИКАЗЫ", field: "orders" },
                            { n: 8, icon: "✨", title: "ИДЕАЛЬНАЯ КАРТИНА", field: "ideal" },
                            { n: 9, icon: "📊", title: "СТАТИСТИКИ", field: "stats" },
                            { n: 10, icon: "🎯", title: "ЦКП", field: "vfp" }
                        ].filter(l => l.field !== 'orders' || l.n === 7).map(l => {
                            if (!scale[l.field]) return null;
                            return (
                                <div key={l.n} className={`scale-card p-6 rounded-xl border-l-4 level-${l.n}`}>
                                    <h3 className="text-2xl font-bold mb-4">
                                        <span className="text-3xl mr-3">{l.icon}</span>{l.n}. {l.title}
                                    </h3>
                                    <div className="text-gray-300 whitespace-pre-wrap">{scale[l.field]}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function TaskItem({ task, progIdx, stepIdx, type, taskIdx, onUpd, onDel }) {
            return (
                <div className="bg-gray-800 rounded p-3 flex items-start gap-3 hover:bg-gray-750 transition">
                    <input type="checkbox" checked={task.completed} 
                        onChange={(e) => onUpd(progIdx, stepIdx, type, taskIdx, 'completed', e.target.checked)}
                        className="mt-1 w-5 h-5 accent-green-500 cursor-pointer" />
                    
                    <div className="flex-1 space-y-2">
                        <div contentEditable suppressContentEditableWarning 
                            onBlur={(e) => onUpd(progIdx, stepIdx, type, taskIdx, 'text', e.target.innerText)}
                            className={`px-2 py-1 bg-gray-700 rounded hover:bg-gray-600 ${task.completed ? 'line-through opacity-60' : ''}`}
                        >{task.text}</div>
                        
                        <div className="flex flex-wrap gap-2 text-sm">
                            <input type="date" value={task.deadline || ""} 
                                onChange={(e) => onUpd(progIdx, stepIdx, type, taskIdx, 'deadline', e.target.value)}
                                className="px-2 py-1 bg-gray-700 rounded text-xs no-print" 
                                placeholder="Дедлайн" />
                            <input type="text" value={task.responsible || ""} 
                                onChange={(e) => onUpd(progIdx, stepIdx, type, taskIdx, 'responsible', e.target.value)}
                                className="px-2 py-1 bg-gray-700 rounded text-xs flex-1 no-print" 
                                placeholder="Ответственный" />
                            {task.deadline && (
                                <span className="px-2 py-1 bg-blue-600/20 text-blue-300 rounded text-xs whitespace-nowrap">
                                    📅 {new Date(task.deadline).toLocaleDateString('ru-RU')}
                                </span>
                            )}
                            {task.responsible && (
                                <span className="px-2 py-1 bg-green-600/20 text-green-300 rounded text-xs whitespace-nowrap">
                                    👤 {task.responsible}
                                </span>
                            )}
                        </div>
                    </div>

                    <button onClick={() => onDel(progIdx, stepIdx, type, taskIdx)} 
                        className="text-red-500 hover:text-red-400 no-print mt-1">
                        <i className="fas fa-times"></i>
                    </button>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
